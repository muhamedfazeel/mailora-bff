name: Build Check

on:
  push:
    branches: [dev, stg, release]
  pull_request:
    branches: [dev, stg, release]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || '20.15.0' }}

      # Verify package.json exists
      - name: Check for package.json
        run: |
          if [ ! -f package.json ]; then
            echo "Error: package.json not found"
            exit 1
          fi

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run build
      - name: Run build
        run: npm run build

      #Upload build artifacts in case of failure
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
